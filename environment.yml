name: codonpipe
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Python
  - python>=3.9
  - pip

  # Bioinformatics tools
  - prokka>=1.14
  - cogclassifier>=1.0
  - kofamscan>=1.3
  - hmmer>=3.3

  # Python scientific stack
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - scikit-learn>=1.2
  - matplotlib>=3.7
  - seaborn>=0.12
  - biopython>=1.81
  - umap-learn>=0.5
  - tqdm>=4.65
  - click>=8.1

  # R and coRdon
  - r-base>=4.2
  - bioconductor-cordon>=1.16
  - bioconductor-biostrings>=2.66
  - bioconductor-iranges>=2.32
  - r-data.table>=1.14

  # Development (optional)
  - pytest>=7.0
  - ruff>=0.1

  - pip:
    - codonpipe
