name: codonpipe
channels:
  - conda-forge
  - bioconda
dependencies:
  # Python
  - python>=3.9

  # Bioinformatics tools
  - prokka>=1.14
  - cogclassifier>=1.0
  - kofamscan>=1.3
  - hmmer>=3.3

  # Python scientific stack
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - scikit-learn>=1.2
  - matplotlib>=3.7
  - seaborn>=0.12
  - biopython>=1.81
  - umap-learn>=0.5
  - plotly>=5.18
  - python-kaleido>=0.2
  - tqdm>=4.65
  - click>=8.1

  # R and Bioconductor packages
  - r-base>=4.2
  - bioconductor-cordon>=1.16
  - bioconductor-biostrings>=2.66
  - bioconductor-iranges>=2.32
  - r-matrixstats>=1.0
  - r-dplyr>=1.1
  - r-jsonlite>=1.8
  - r-remotes>=2.4

  # gRodon2 is not available via conda — install after environment creation:
  #   conda activate codonpipe
  #   codonpipe install-grodon

  # Development (optional)
  - pytest>=7.0
  - ruff>=0.1
